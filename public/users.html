<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoteVault — Users</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .user-table-wrapper {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    th {
      padding: 0.75rem 1.2rem;
      text-align: left;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    td {
      padding: 0.9rem 1.2rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }

    tbody tr { transition: background 0.15s; }
    tbody tr:hover { background: rgba(124,106,255,0.04); }

    .user-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
    }

    .user-name-cell {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .user-name { font-weight: 700; }

    .email-cell {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .date-cell {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--text-dim);
    }

    .table-toolbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .search-bar {
      position: relative;
      max-width: 280px;
      width: 100%;
    }

    .search-bar input { padding-left: 2.2rem; }
    .search-icon {
      position: absolute;
      left: 0.7rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
    }

    .user-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-left: auto;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      td:nth-child(3), th:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/">⬡ NoteVault</a>
    <ul class="nav-links">
      <li><a href="/">Dashboard</a></li>
      <li><a href="/notes">Notes</a></li>
      <li><a href="/users" class="active">Users</a></li>
    </ul>
  </nav>

  <main>
    <div class="page-header">
      <div>
        <h2>User Registry</h2>
        <p class="muted mt-1" style="font-size:0.9rem;">Manage registered users</p>
      </div>
      <button class="btn btn-primary" onclick="openModal('add-user-modal')">👤 Add User</button>
    </div>

    <div class="table-toolbar">
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="user-search" placeholder="Search users..." oninput="filterUsers()" />
      </div>
      <span class="user-count" id="user-count">Loading...</span>
    </div>

    <div class="user-table-wrapper">
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>Email</th>
            <th>Joined</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="users-tbody">
          <tr><td colspan="4" style="text-align:center; padding:3rem; color:var(--text-dim);">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Add User Modal -->
  <div class="modal-overlay" id="add-user-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Add New User</h3>
        <button class="btn btn-ghost" style="padding:0.3rem 0.6rem;" onclick="closeModal('add-user-modal')">✕</button>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="user-name" placeholder="John Doe" />
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="user-email" placeholder="john@example.com" />
        </div>
      </div>
      <div style="display:flex; gap:0.5rem; justify-content:flex-end; margin-top:0.5rem;">
        <button class="btn btn-ghost" onclick="closeModal('add-user-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="addUser()">Add User</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="app.js"></script>
  <script>
    let allUsers = [];

    async function loadUsers() {
      try {
        const res = await fetch('/api/users');
        allUsers = await res.json();
        renderUsers(allUsers);
      } catch (e) {
        showToast('Failed to load users', 'error');
      }
    }

    function getInitials(name) {
      return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    }

    function renderUsers(users) {
      const tbody = document.getElementById('users-tbody');
      document.getElementById('user-count').textContent = `${users.length} user${users.length !== 1 ? 's' : ''}`;

      if (!users.length) {
        tbody.innerHTML = `
          <tr>
            <td colspan="4" style="text-align:center; padding:3rem; color:var(--text-dim);">
              <div style="font-size:2rem; margin-bottom:0.5rem;">👥</div>
              No users registered yet
            </td>
          </tr>`;
        return;
      }

      tbody.innerHTML = users.map(u => `
        <tr>
          <td>
            <div class="user-name-cell">
              <div class="user-avatar">${getInitials(u.name)}</div>
              <span class="user-name">${escapeHtml(u.name)}</span>
            </div>
          </td>
          <td class="email-cell">${escapeHtml(u.email)}</td>
          <td class="date-cell">${formatDate(u.created_at)}</td>
          <td>
            <button class="btn btn-danger" style="padding:0.3rem 0.7rem; font-size:0.78rem;" onclick="deleteUser(${u.id}, '${escapeHtml(u.name)}')">
              Remove
            </button>
          </td>
        </tr>
      `).join('');
    }

    function filterUsers() {
      const q = document.getElementById('user-search').value.toLowerCase();
      renderUsers(allUsers.filter(u =>
        u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)
      ));
    }

    async function addUser() {
      const name = document.getElementById('user-name').value.trim();
      const email = document.getElementById('user-email').value.trim();

      if (!name || !email) return showToast('Name and email are required', 'error');
      if (!email.includes('@')) return showToast('Enter a valid email', 'error');

      try {
        const res = await fetch('/api/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email })
        });
        const data = await res.json();
        if (!res.ok) return showToast(data.error, 'error');

        allUsers.unshift(data);
        renderUsers(allUsers);
        closeModal('add-user-modal');
        document.getElementById('user-name').value = '';
        document.getElementById('user-email').value = '';
        showToast(`${name} registered! 🎉`);
      } catch (e) {
        showToast('Failed to add user', 'error');
      }
    }

    async function deleteUser(id, name) {
      if (!confirm(`Remove ${name}?`)) return;
      try {
        await fetch(`/api/users/${id}`, { method: 'DELETE' });
        allUsers = allUsers.filter(u => u.id !== id);
        renderUsers(allUsers);
        showToast(`${name} removed`);
      } catch (e) {
        showToast('Failed to remove user', 'error');
      }
    }

    loadUsers();
  </script>
</body>
</html>
